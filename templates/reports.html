{% extends "base.html" %}
{% block content %}
<div class="card p-3 mb-3">
  <h5>Monthly Summary</h5>
  <table class="table">
    <thead><tr><th>Month</th><th>Income</th><th>Expense</th><th>Net</th></tr></thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r.month }}</td>
        <td class="text-success">₹{{ '%.2f'|format(r.income or 0) }}</td>
        <td class="text-danger">₹{{ '%.2f'|format(r.expense or 0) }}</td>
        <td>{{ '%.2f'|format((r.income or 0) - (r.expense or 0)) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <a class="btn btn-primary" href="{{ url_for('index') }}">Back</a>
</div>
{% endblock %}
